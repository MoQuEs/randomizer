<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endfield Randomizer</title>

    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="icon" type="image/png" href="images/favicon.ico">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const getRandomItem = (list) => list[Math.floor(Math.random() * list.length)];

        const shuffle = (list) => {
            const copy = [...list];
            for (let i = copy.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        };

        const pickUnique = (list, count) => shuffle(list).slice(0, count);

        const flattenStages = (stagesObj) => {
            const result = [];
            Object.entries(stagesObj || {}).forEach(([zoneName, zoneData]) => {
                Object.entries(zoneData || {}).forEach(([categoryName, categoryData]) => {
                    Object.entries(categoryData || {}).forEach(([stageName, stageData]) => {
                        result.push({
                            id: `${zoneName}::${categoryName}::${stageName}`,
                            zone: zoneName,
                            category: categoryName,
                            name: stageName,
                            lv: stageData.lv
                        });
                    });
                });
            });
            return result;
        };

        // Backtracking assignment to respect weapon count limits and type compatibility.
        const assignWeaponsToCharacters = (characters, weapons, weaponCountMap) => {
            const usedCounts = { ...weaponCountMap };
            const byType = {};
            weapons.forEach((weapon) => {
                if (!byType[weapon.type]) byType[weapon.type] = [];
                byType[weapon.type].push(weapon);
            });

            const optionsByCharacter = {};
            characters.forEach((character) => {
                optionsByCharacter[character.name] = (byType[character.type] || []).filter(
                    (weapon) => (usedCounts[weapon.name] || 0) > 0
                );
            });

            const order = [...characters].sort(
                (a, b) => optionsByCharacter[a.name].length - optionsByCharacter[b.name].length
            );
            const assignment = {};

            const walk = (idx) => {
                if (idx >= order.length) return true;

                const character = order[idx];
                const options = shuffle(optionsByCharacter[character.name]).filter(
                    (weapon) => (usedCounts[weapon.name] || 0) > 0
                );

                for (const weapon of options) {
                    usedCounts[weapon.name] -= 1;
                    assignment[character.name] = weapon;
                    if (walk(idx + 1)) return true;
                    usedCounts[weapon.name] += 1;
                    delete assignment[character.name];
                }

                return false;
            };

            return walk(0) ? assignment : null;
        };

        const AccordionSection = ({ title, defaultOpen = true, children }) => {
            const [open, setOpen] = useState(defaultOpen);
            return (
                <div className="panel-card">
                    <button className="panel-header" onClick={() => setOpen((prev) => !prev)}>
                        <span>{title}</span>
                        <span className="panel-caret">{open ? '-' : '+'}</span>
                    </button>
                    {open && <div className="panel-body">{children}</div>}
                </div>
            );
        };

        function App() {
            const [data, setData] = useState(null);
            const [error, setError] = useState('');

            const [selectedCharacters, setSelectedCharacters] = useState(new Set());
            const [selectedWeapons, setSelectedWeapons] = useState(new Set());
            const [weaponCounts, setWeaponCounts] = useState({});
            const [selectedStages, setSelectedStages] = useState(new Set());
            const [selectedCcs, setSelectedCcs] = useState(new Set());
            const [stageOrCcMode, setStageOrCcMode] = useState('stage');

            const [characterSearch, setCharacterSearch] = useState('');
            const [characterClassFilter, setCharacterClassFilter] = useState('All');
            const [characterElementFilter, setCharacterElementFilter] = useState('All');
            const [weaponSearch, setWeaponSearch] = useState('');
            const [weaponTypeFilter, setWeaponTypeFilter] = useState('All');
            const [stageSearch, setStageSearch] = useState('');

            const [output, setOutput] = useState(null);

            useEffect(() => {
                fetch('data.json')
                    .then((res) => {
                        if (!res.ok) throw new Error('Cannot load data.json');
                        return res.json();
                    })
                    .then((json) => {
                        const stagesFlat = flattenStages(json.stages);
                        setData({ ...json, stagesFlat });

                        setSelectedCharacters(new Set(json.characters.map((c) => c.name)));
                        setSelectedWeapons(new Set(json.weapons.map((w) => w.name)));
                        setSelectedStages(new Set(stagesFlat.map((s) => s.id)));
                        setSelectedCcs(new Set((json.ccs || []).map((cc) => cc.name)));

                        const initialWeaponCounts = {};
                        json.weapons.forEach((w) => {
                            initialWeaponCounts[w.name] = 1;
                        });
                        setWeaponCounts(initialWeaponCounts);
                    })
                    .catch((err) => {
                        setError(err.message || 'Failed to load data');
                    });
            }, []);

            const filteredCharacters = useMemo(() => {
                if (!data) return [];
                return data.characters.filter((character) => {
                    const matchesSearch = character.name.toLowerCase().includes(characterSearch.toLowerCase());
                    const matchesClass = characterClassFilter === 'All' || character.class === characterClassFilter;
                    const matchesElement = characterElementFilter === 'All' || character.element === characterElementFilter;
                    return matchesSearch && matchesClass && matchesElement;
                });
            }, [data, characterSearch, characterClassFilter, characterElementFilter]);

            const filteredWeapons = useMemo(() => {
                if (!data) return [];
                return data.weapons.filter((weapon) => {
                    const matchesSearch = weapon.name.toLowerCase().includes(weaponSearch.toLowerCase());
                    const matchesType = weaponTypeFilter === 'All' || weapon.type === weaponTypeFilter;
                    return matchesSearch && matchesType;
                });
            }, [data, weaponSearch, weaponTypeFilter]);

            const filteredStages = useMemo(() => {
                if (!data) return [];
                return data.stagesFlat.filter((stage) => {
                    const text = `${stage.zone} ${stage.category} ${stage.name}`.toLowerCase();
                    return text.includes(stageSearch.toLowerCase());
                });
            }, [data, stageSearch]);

            const filteredCcs = useMemo(() => {
                if (!data) return [];
                const q = stageSearch.toLowerCase();
                return (data.ccs || []).filter((cc) => cc.name.toLowerCase().includes(q));
            }, [data, stageSearch]);

            const updateSetSelection = (setter, key) => {
                setter((prev) => {
                    const next = new Set(prev);
                    if (next.has(key)) next.delete(key);
                    else next.add(key);
                    return next;
                });
            };

            const setAllVisible = (items, getKey, setter, checked) => {
                setter((prev) => {
                    const next = new Set(prev);
                    items.forEach((item) => {
                        const key = getKey(item);
                        if (checked) next.add(key);
                        else next.delete(key);
                    });
                    return next;
                });
            };

            const runRandomizer = () => {
                if (!data) return;

                const availableCharacters = data.characters.filter((c) => selectedCharacters.has(c.name));
                if (availableCharacters.length < 4) {
                    setOutput({ error: 'Select at least 4 characters.', team: [], weapons: [], stageOrCc: null, mode: stageOrCcMode });
                    return;
                }

                const selectedTeam = pickUnique(availableCharacters, 4);

                const availableWeapons = data.weapons.filter((w) => selectedWeapons.has(w.name) && (weaponCounts[w.name] || 0) > 0);
                if (availableWeapons.length === 0) {
                    setOutput({ error: 'Select at least one weapon with count > 0.', team: [], weapons: [], stageOrCc: null, mode: stageOrCcMode });
                    return;
                }

                const assignment = assignWeaponsToCharacters(selectedTeam, availableWeapons, weaponCounts);
                if (!assignment) {
                    setOutput({
                        error: 'Cannot assign weapons to all 4 characters. Increase counts or select more compatible weapon types.',
                        team: selectedTeam,
                        weapons: [],
                        stageOrCc: null,
                        mode: stageOrCcMode
                    });
                    return;
                }

                let stageOrCc = null;
                if (stageOrCcMode === 'stage') {
                    const availableStageList = data.stagesFlat.filter((s) => selectedStages.has(s.id));
                    if (availableStageList.length === 0) {
                        setOutput({ error: 'Select at least one stage.', team: selectedTeam, weapons: [], stageOrCc: null, mode: 'stage' });
                        return;
                    }
                    stageOrCc = getRandomItem(availableStageList);
                } else {
                    const availableCcList = (data.ccs || []).filter((cc) => selectedCcs.has(cc.name));
                    if (availableCcList.length === 0) {
                        setOutput({ error: 'Select at least one CC.', team: selectedTeam, weapons: [], stageOrCc: null, mode: 'cc' });
                        return;
                    }
                    stageOrCc = getRandomItem(availableCcList);
                }

                setOutput({
                    error: '',
                    team: selectedTeam,
                    weapons: selectedTeam.map((character) => ({
                        characterName: character.name,
                        weapon: assignment[character.name]
                    })),
                    stageOrCc,
                    mode: stageOrCcMode
                });
            };

            if (error) {
                return <div className="loading-overlay">{error}</div>;
            }

            if (!data) {
                return <div className="loading-overlay">Loading data...</div>;
            }

            return (
                <div className="container-fluid py-4 app-shell">
                    <header className="mb-3">
                        <h2 className="m-0">Endfield Team Randomizer</h2>
                    </header>

                    <section className="result-card mb-4">
                        <div className="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                            <h4 className="m-0">Randomized Output</h4>
                            <button className="action-btn" onClick={runRandomizer}>RANDOMIZE</button>
                        </div>

                        {!output && <div className="empty-state">Press RANDOMIZE to generate a team.</div>}

                        {output && (
                            <div className="output-grid">
                                {output.error && <div className="error-text">{output.error}</div>}

                                <div className="output-group">
                                    <div className="output-label">Characters</div>
                                    <div className="chips-wrap">
                                        {output.team.map((character, idx) => (
                                            <span className="chip" key={`character-${character.name}-${idx}`}>
                                                {`Character ${idx + 1}: ${character.name}`}
                                            </span>
                                        ))}
                                    </div>
                                </div>

                                <div className="output-group">
                                    <div className="output-label">Weapons</div>
                                    <div className="chips-wrap">
                                        {output.weapons.map((entry, idx) => (
                                            <span className="chip" key={`weapon-${entry.characterName}-${idx}`}>
                                                {`Weapon ${idx + 1}: ${entry.weapon.name} -> ${entry.characterName}`}
                                            </span>
                                        ))}
                                    </div>
                                </div>

                                <div className="output-group">
                                    <div className="output-label">{output.mode === 'stage' ? 'Stage' : 'CC'}</div>
                                    {output.mode === 'stage' && output.stageOrCc && (
                                        <span className="chip chip-stage">
                                            {`${output.stageOrCc.zone} / ${output.stageOrCc.category} / ${output.stageOrCc.name} (Lv ${output.stageOrCc.lv})`}
                                        </span>
                                    )}
                                    {output.mode === 'cc' && output.stageOrCc && (
                                        <div className="cc-placeholder-wrap">
                                            <span className="chip chip-stage">{output.stageOrCc.name}</span>
                                            <div className="muted-note">CC tags/options randomization not implemented yet.</div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </section>

                    <div className="row g-4">
                        <div className="col-lg-6">
                            <AccordionSection title="Characters" defaultOpen={true}>
                                <div className="filter-row">
                                    <input
                                        className="filter-input"
                                        type="text"
                                        aria-label="Search characters"
                                        placeholder="Search character..."
                                        value={characterSearch}
                                        onChange={(e) => setCharacterSearch(e.target.value)}
                                    />
                                    <select aria-label="Filter characters by class" className="filter-select" value={characterClassFilter} onChange={(e) => setCharacterClassFilter(e.target.value)}>
                                        <option value="All">All Classes</option>
                                        {data.classes.map((item) => <option key={item} value={item}>{item}</option>)}
                                    </select>
                                    <select aria-label="Filter characters by element" className="filter-select" value={characterElementFilter} onChange={(e) => setCharacterElementFilter(e.target.value)}>
                                        <option value="All">All Elements</option>
                                        {data.elements.map((item) => <option key={item} value={item}>{item}</option>)}
                                    </select>
                                </div>
                                <div className="control-row">
                                    <button className="mini-btn" onClick={() => setAllVisible(filteredCharacters, (x) => x.name, setSelectedCharacters, true)}>Select visible</button>
                                    <button className="mini-btn" onClick={() => setAllVisible(filteredCharacters, (x) => x.name, setSelectedCharacters, false)}>Clear visible</button>
                                    <span className="count-text">Selected: {selectedCharacters.size}</span>
                                </div>
                                <div className="list-wrap">
                                    {filteredCharacters.map((character) => (
                                        <label className="list-item" key={character.name}>
                                            <input
                                                type="checkbox"
                                                checked={selectedCharacters.has(character.name)}
                                                onChange={() => updateSetSelection(setSelectedCharacters, character.name)}
                                            />
                                            <span className="item-main">{character.name}</span>
                                            <span className="item-meta">{`${character.class} | ${character.type} | ${character.element}`}</span>
                                        </label>
                                    ))}
                                </div>
                            </AccordionSection>

                            <AccordionSection title="Weapons" defaultOpen={true}>
                                <div className="filter-row">
                                    <input
                                        className="filter-input"
                                        type="text"
                                        aria-label="Search weapons"
                                        placeholder="Search weapon..."
                                        value={weaponSearch}
                                        onChange={(e) => setWeaponSearch(e.target.value)}
                                    />
                                    <select aria-label="Filter weapons by type" className="filter-select" value={weaponTypeFilter} onChange={(e) => setWeaponTypeFilter(e.target.value)}>
                                        <option value="All">All Weapon Types</option>
                                        {data.weaponcategory.map((item) => <option key={item} value={item}>{item}</option>)}
                                    </select>
                                </div>
                                <div className="control-row">
                                    <button className="mini-btn" onClick={() => setAllVisible(filteredWeapons, (x) => x.name, setSelectedWeapons, true)}>Select visible</button>
                                    <button className="mini-btn" onClick={() => setAllVisible(filteredWeapons, (x) => x.name, setSelectedWeapons, false)}>Clear visible</button>
                                    <span className="count-text">Selected: {selectedWeapons.size}</span>
                                </div>
                                <div className="list-wrap">
                                    {filteredWeapons.map((weapon) => (
                                        <label className="list-item weapon-item" key={weapon.name}>
                                            <div className="d-flex align-items-center gap-2 flex-wrap">
                                                <input
                                                    type="checkbox"
                                                    checked={selectedWeapons.has(weapon.name)}
                                                    onChange={() => updateSetSelection(setSelectedWeapons, weapon.name)}
                                                />
                                                <span className="item-main">{weapon.name}</span>
                                                <span className="item-meta">{`${weapon.type} | ${weapon.rarity}*`}</span>
                                            </div>
                                            <div className="count-input-wrap">
                                                <label className="count-label" htmlFor={`count-${weapon.name}`}>Count</label>
                                                <input
                                                    id={`count-${weapon.name}`}
                                                    className="count-input"
                                                    type="number"
                                                    min="0"
                                                    value={weaponCounts[weapon.name] || 0}
                                                    onChange={(e) => {
                                                        const value = Number.parseInt(e.target.value, 10);
                                                        setWeaponCounts((prev) => ({
                                                            ...prev,
                                                            [weapon.name]: Number.isNaN(value) ? 0 : Math.max(0, value)
                                                        }));
                                                    }}
                                                />
                                            </div>
                                        </label>
                                    ))}
                                </div>
                            </AccordionSection>
                        </div>

                        <div className="col-lg-6">
                            <AccordionSection title="Stage / CC Mode" defaultOpen={true}>
                                <div className="mode-row">
                                    <label className={`mode-pill ${stageOrCcMode === 'stage' ? 'mode-pill-active' : ''}`}>
                                        <input
                                            type="radio"
                                            name="stage-or-cc"
                                            checked={stageOrCcMode === 'stage'}
                                            onChange={() => setStageOrCcMode('stage')}
                                        />
                                        <span>Stage</span>
                                    </label>
                                    <label className={`mode-pill ${stageOrCcMode === 'cc' ? 'mode-pill-active' : ''}`}>
                                        <input
                                            type="radio"
                                            name="stage-or-cc"
                                            checked={stageOrCcMode === 'cc'}
                                            onChange={() => setStageOrCcMode('cc')}
                                        />
                                        <span>CC</span>
                                    </label>
                                </div>
                                <div className="muted-note">Only one mode is used in output: Stage or CC (never both).</div>
                            </AccordionSection>

                            <AccordionSection title="Stages" defaultOpen={true}>
                                <div className="filter-row">
                                    <input
                                        className="filter-input"
                                        type="text"
                                        aria-label="Search stages"
                                        placeholder="Search stage..."
                                        value={stageSearch}
                                        onChange={(e) => setStageSearch(e.target.value)}
                                    />
                                </div>
                                <div className="control-row">
                                    <button className="mini-btn" onClick={() => setAllVisible(filteredStages, (x) => x.id, setSelectedStages, true)}>Select visible</button>
                                    <button className="mini-btn" onClick={() => setAllVisible(filteredStages, (x) => x.id, setSelectedStages, false)}>Clear visible</button>
                                    <span className="count-text">Selected: {selectedStages.size}</span>
                                </div>
                                <div className="list-wrap">
                                    {filteredStages.map((stage) => (
                                        <label className="list-item" key={stage.id}>
                                            <input
                                                type="checkbox"
                                                checked={selectedStages.has(stage.id)}
                                                onChange={() => updateSetSelection(setSelectedStages, stage.id)}
                                            />
                                            <span className="item-main">{stage.name}</span>
                                            <span className="item-meta">{`${stage.zone} | ${stage.category} | Lv ${stage.lv}`}</span>
                                        </label>
                                    ))}
                                </div>
                            </AccordionSection>

                            <AccordionSection title="CC" defaultOpen={true}>
                                <div className="control-row">
                                    <button className="mini-btn" onClick={() => setAllVisible(filteredCcs, (x) => x.name, setSelectedCcs, true)}>Select all</button>
                                    <button className="mini-btn" onClick={() => setAllVisible(filteredCcs, (x) => x.name, setSelectedCcs, false)}>Clear all</button>
                                    <span className="count-text">Selected: {selectedCcs.size}</span>
                                </div>
                                <div className="list-wrap">
                                    {filteredCcs.map((cc) => (
                                        <label className="list-item" key={cc.name}>
                                            <input
                                                type="checkbox"
                                                checked={selectedCcs.has(cc.name)}
                                                onChange={() => updateSetSelection(setSelectedCcs, cc.name)}
                                            />
                                            <span className="item-main">{cc.name}</span>
                                            <span className="item-meta">Tags randomization not implemented yet</span>
                                        </label>
                                    ))}
                                </div>
                            </AccordionSection>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
