                                    <input
                                        type="radio"
                                        name="stage-or-cc"
                                        checked={stageOrCcMode === 'cc'}
                                        onChange={() => setStageOrCcMode('cc')}
                                    />
                                    <span>CC</span>
                                </label>
                            </div>
                            <div className="muted-note">Switching mode hides and turns off the other section
                                                        selection.
                            </div>
                        </AccordionSection>

                        {stageOrCcMode === 'stage' && (
                            <AccordionSection
                                title="Stages"
                                titleExtra={<span className="count-text-header">Selected: {selectedStages.size}</span>}
                                defaultOpen={true}
                            >
                                <div className="filter-row">
                                    <input
                                        className="filter-input"
                                        type="text"
                                        aria-label="Search stages"
                                        placeholder="Search stage..."
                                        value={stageSearch}
                                        onChange={(e) => setStageSearch(e.target.value)}
                                    />
                                </div>
                                <div className="control-row">
                                    <button
                                        type="button"
                                        className="mini-btn"
                                        onClick={() => setSelectedStages((prev) => {
                                            const next = new Set(prev);
                                            filteredStages.forEach((item) => next.add(item.id));
                                            return next;
                                        })}
                                    >
                                        Select visible
                                    </button>
                                    <button
                                        type="button"
                                        className="mini-btn"
                                        onClick={() => setSelectedStages((prev) => {
                                            const next = new Set(prev);
                                            filteredStages.forEach((item) => next.delete(item.id));
                                            return next;
                                        })}
                                    >
                                        Clear visible
                                    </button>
                                    <button
                                        type="button"
                                        className="mini-btn"
                                        onClick={() => {
                                            setSelectedStages(prev => {
                                                const next = new Set(prev);
                                                Object.values(groupedStages).forEach((rows) => {
                                                    rows.forEach((row) => {
                                                        const toKeep = row.levels.at(-1);
                                                        row.levels.forEach((item) => {
                                                            if (item.id !== toKeep?.id) {
                                                                next.delete(item.id);
                                                            }
                                                        });
                                                    });
                                                });
                                                return next;
                                            });
                                        }}
                                    >
                                        Unselect lesser stages
                                    </button>
                                    <button
                                        type="button"
                                        className="mini-btn"
                                        onClick={() => {
                                            setSelectedStages(prev => {
                                                const next = new Set(prev);
                                                filteredStages.forEach(item => {
                                                    if (
                                                        !item.zone.includes('RE-Crisis')
	                                                    && !item.zone.includes('Crisis Fragment')
                                                    ) {
                                                        next.delete(item.id);
                                                    }
                                                });
                                                return next;
                                            });
                                        }}
                                    >
                                        Unselect non RE-Crisis & Crisis Fragment
                                    </button>
                                </div>
                                {Object.entries(groupedStages).map(([zoneName, rows]) => {
                                    const allZoneItems = rows.flatMap((row) => row.levels);
                                    return (
                                        <div key={zoneName} className="stage-zone-block">
                                            <div className="stage-zone-header">
                                                <button
                                                    type="button"
                                                    className="mini-btn"
                                                    onClick={() => {
                                                        setSelectedStages(prev => {
                                                            const next = new Set(prev);
                                                            const allSelected = allZoneItems.every(item => next.has(item.id));
                                                            if (allSelected) {
                                                                allZoneItems.forEach(item => next.delete(item.id));
                                                            } else {
                                                                allZoneItems.forEach(item => next.add(item.id));
                                                            }
                                                            return next;
                                                        });
                                                    }}
                                                >
                                                    {zoneName}
                                                </button>
                                                <span className="muted-note">{rows.length} groups</span>
                                            </div>
                                            <div className="cc-tag-list">
                                                {rows.map((row) => {
                                                    const allRowSelected = row.levels.every((level) => selectedStages.has(level.id));
                                                    return (
                                                        <StageTagRow
                                                            key={row.baseId}
                                                            row={row}
                                                            isLevelSelected={(id) => selectedStages.has(id)}
                                                            onToggleLevel={(id) => setSelectedStages((prev) => toggleInSet(prev, id))}
                                                            onToggleRow={() => {
                                                                setSelectedStages((prev) => {
                                                                    const next = new Set(prev);
                                                                    if (allRowSelected) {
                                                                        row.levels.forEach((level) => next.delete(level.id));
                                                                    } else {
                                                                        row.levels.forEach((level) => next.add(level.id));
                                                                    }
                                                                    return next;
                                                                });
                                                            }}
                                                        />
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                })}
                            </AccordionSection>
                        )}

                        {stageOrCcMode === 'cc' && (

                                title="CC"
                                titleExtra={<span className="count-text-header">Selected: {selectedCcName ? 1 : 0}</span>}
                                defaultOpen={true}
                            >
                                <div className="filter-row">
                                    <input
                                        className="filter-input"
                                        type="text"
                                        aria-label="Search cc"
                                        placeholder="Search CC..."
                                        value={ccSearch}
                                        onChange={(e) => setCcSearch(e.target.value)}
                                    />
                                </div>
                                <div className="control-row">
                                    <button
                                        type="button"
                                        className="mini-btn"
                                        onClick={() => setSelectedCcName(filteredCcs[0]?.name || '')}
                                    >
                                        Pick first visible
                                    </button>
                                    <button
                                        type="button"
                                        className="mini-btn"
                                        onClick={() => setSelectedCcName('')}
                                    >
                                        Clear CC selection
                                    </button>
                                </div>
                                <div className="tile-grid">
                                    {filteredCcs.map((cc) => (
                                        <SquareTile
                                            key={cc.name}
                                            selected={selectedCcName === cc.name}
                                            onClick={() => setSelectedCcName(cc.name)}
                                            image={`images/cc_${normalizeName(cc.name)}.png`}
                                            placeholderImage="images/placeholder_cc.svg"
                                            title={cc.name}
                                        />
                                    ))}
                                </div>

                                {selectedCc && (
                                    <div className="mt-3">
                                        <div className="control-row">
                                            <label className="count-text" htmlFor="cc-risk-min">Min risk</label>
                                            <input
                                                id="cc-risk-min"
                                                className="count-input"
                                                type="number"
                                                min="0"
                                                max={selectedCcRisk.maxRisk}
                                                value={selectedCcRisk.min}
                                                onChange={(e) => {
                                                    const value = Number.parseInt(e.target.value, 10);
                                                    const parsed = Number.isNaN(value) ? 0 : Math.max(0, value);
                                                    setCcRiskSettings((prev) => {
                                                        const next = {...prev};
                                                        const current = next[selectedCc.name] || {min: 0, max: selectedCcRisk.maxRisk};
                                                        const nextMin = Math.min(parsed, selectedCcRisk.maxRisk);
                                                        const nextMax = Math.max(nextMin, Math.min(current.max, selectedCcRisk.maxRisk));
                                                        next[selectedCc.name] = {min: nextMin, max: nextMax};
                                                        return next;
                                                    });
                                                }}
                                            />
                                            <label className="count-text" htmlFor="cc-risk-max">Max risk</label>
                                            <input
                                                id="cc-risk-max"
                                                className="count-input"
                                                type="number"
                                                min={selectedCcRisk.min}
                                                max={selectedCcRisk.maxRisk}
                                                value={selectedCcRisk.max}
                                                onChange={(e) => {
                                                    const value = Number.parseInt(e.target.value, 10);
                                                    const parsed = Number.isNaN(value) ? selectedCcRisk.maxRisk : Math.max(0, value);
                                                    setCcRiskSettings((prev) => {
                                                        const next = {...prev};
                                                        const current = next[selectedCc.name] || {min: 0, max: selectedCcRisk.maxRisk};
                                                        const nextMax = Math.min(Math.max(current.min, parsed), selectedCcRisk.maxRisk);
                                                        next[selectedCc.name] = {min: current.min, max: nextMax};
                                                        return next;
                                                    });
                                                }}
                                            />
                                            <span className="muted-note">CC max: {selectedCcRisk.maxRisk}</span>
                                        </div>

                                        <div className="filter-row">
                                            <input
                                                className="filter-input"
                                                type="text"
                                                aria-label="Search cc tags"
                                                placeholder="Search CC tags..."
                                                value={ccTagSearch}
                                                onChange={(e) => setCcTagSearch(e.target.value)}
                                            />
                                        </div>

                                        <div className="chips-row">
                                            {(selectedCc.categories || []).map((category) => (
                                                <button
                                                    type="button"
                                                    key={`cc-cat-${category}`}
                                                    className={`filter-chip ${ccCategoryFilters.has(category) ? 'filter-chip-active' : ''}`}
                                                    onClick={() => setCcCategoryFilters((prev) => toggleInSet(prev, category))}

                                                    {category}
                                                </button>
                                            ))}
                                        </div>

                                        <div className="control-row">
                                            <button
                                                type="button"
                                                className="mini-btn"
                                                onClick={() => {
                                                    setCcTagSelection((prev) => {
                                                        const next = {...prev};
                                                        const ccState = {...(next[selectedCc.name] || {})};
                                                        filteredCcTags.forEach(([tagName]) => {
                                                            const current = ccState[tagName] || {enabled: true, costs: {}};
                                                            const costs = Object.fromEntries((selectedCc.tags[tagName]?.cost || []).map((cost) => [cost, true]));
                                                            ccState[tagName] = {...current, enabled: true, costs};
                                                        });
                                                        next[selectedCc.name] = ccState;
                                                        return next;
                                                    });
                                                }}
                                            >
                                                Enable visible tags
                                            </button>
                                            <button
                                                type="button"
                                                className="mini-btn"
                                                onClick={() => {
                                                    setCcTagSelection((prev) => {
                                                        const next = {...prev};
                                                        const ccState = {...(next[selectedCc.name] || {})};
                                                        filteredCcTags.forEach(([tagName]) => {
                                                            const current = ccState[tagName] || {enabled: true, costs: {}};
                                                            const costs = Object.fromEntries((selectedCc.tags[tagName]?.cost || []).map((cost) => [cost, false]));
                                                            ccState[tagName] = {...current, enabled: false, costs};
                                                        });
                                                        next[selectedCc.name] = ccState;
                                                        return next;
                                                    });
                                                }}
                                            >
                                                Disable visible tags
                                            </button>
                                        </div>

                                        <div className="cc-tag-list">
                                            {filteredCcTags.map(([tagName, def]) => (
                                                <CcTagRow
                                                    key={`${selectedCc.name}-${tagName}`}
                                                    tagName={tagName}
                                                    def={def}
                                                    state={ccTagSelection[selectedCc.name]?.[tagName]}
                                                    onToggleTag={() => {
                                                        setCcTagSelection((prev) => {
                                                            const next = {...prev};
                                                            const ccState = {...(next[selectedCc.name] || {})};
                                                            const current = ccState[tagName] || {
                                                                enabled: true,
                                                                costs: Object.fromEntries((def.cost || []).map((cost) => [cost, true]))
                                                            };
                                                            const nextEnabled = !(current.enabled !== false);
                                                            const nextCosts = Object.fromEntries((def.cost || []).map((cost) => [cost, nextEnabled]));
                                                            ccState[tagName] = {
                                                                ...current,
                                                                enabled: nextEnabled,
                                                                costs: nextCosts
                                                            };
                                                            next[selectedCc.name] = ccState;
                                                            return next;
                                                        });
                                                    }}
                                                    onToggleCost={(cost) => {
                                                        setCcTagSelection((prev) => {
                                                            const next = {...prev};
                                                            const ccState = {...(next[selectedCc.name] || {})};
                                                            const current = ccState[tagName] || {
                                                                enabled: true,
                                                                costs: Object.fromEntries((def.cost || []).map((itemCost) => [itemCost, true]))
                                                            };
                                                            ccState[tagName] = {
                                                                ...current,
                                                                enabled: Object.values({
                                                                    ...current.costs,
                                                                    [cost]: current.costs?.[cost] === false
                                                                }).some((value) => value !== false),
                                                                costs: {
                                                                    ...current.costs,
                                                                    [cost]: current.costs?.[cost] === false
                                                                }
                                                            };
                                                            next[selectedCc.name] = ccState;
                                                            return next;
                                                        });
                                                    }}
                                                />
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </AccordionSection>
                        )}
                    </div>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
