<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Endfield Randomizer</title>

	<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
	<link rel="icon" type="image/png" href="images/favicon.ico">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
	<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
	<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

	<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const {useState, useEffect, useMemo} = React;

    const normalizeName = (name) =>
        name
            .toLowerCase()
            .replace(/\s+/g, '_')
            .replace(/:/g, '')
            .replace(/'/g, '')
            .replace(/,/g, '')
            .replace(/_+/g, '_');

    const getRandomItem = (list) => list[Math.floor(Math.random() * list.length)];

    const shuffle = (list) => {
        const copy = [...list];
        for (let i = copy.length - 1; i > 0; i -= 1) {
            const j = Math.floor(Math.random() * (i + 1));
            [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
    };

    const pickUnique = (list, count) => shuffle(list).slice(0, count);

    const flattenStages = (stagesObj) => {
        const result = [];
        const stageRoot = stagesObj?.stages && typeof stagesObj.stages === 'object' ? stagesObj.stages : stagesObj;
        Object.entries(stageRoot || {}).forEach(([zoneName, zoneData]) => {
            Object.entries(zoneData || {}).forEach(([groupName, groupData]) => {
                // New format: "Stage Group": [10, 35, 55]
                if (Array.isArray(groupData)) {
                    groupData.forEach((lv) => {
                        if (!Number.isFinite(lv)) return;
                        result.push({
                            id: `${zoneName}::${groupName}::${lv}`,
                            baseId: `${zoneName}::${groupName}`,
                            zone: zoneName,
                            category: groupName,
                            name: groupName,
                            lv
                        });
                    });
                    return;
                }

                // Legacy format: "Category": { "Stage Name": { lv: 80 } }
                Object.entries(groupData || {}).forEach(([stageName, stageData]) => {
                    if (!Number.isFinite(stageData?.lv)) return;
                    result.push({
                        id: `${zoneName}::${groupName}::${stageName}::${stageData.lv}`,
                        baseId: `${zoneName}::${groupName}::${stageName}`,
                        zone: zoneName,
                        category: groupName,
                        name: stageName,
                        lv: stageData.lv
                    });
                });
            });
        });
        return result;
    };

    const getTagCategory = (tagName) => {
        if (!tagName || typeof tagName !== 'string') return 'Other';
        const [category] = tagName.split(':');
        return (category || 'Other').trim();
    };

    const randomIntInclusive = (min, max) => {
        if (max < min) return min;
        return Math.floor(Math.random() * (max - min + 1)) + min;
    };

    const normalizeCcEntries = (ccData) => {
        if (!ccData || typeof ccData !== 'object') return [];

        return Object.entries(ccData).map(([ccName, ccRaw]) => {
            const rawTags = ccRaw?.tags && typeof ccRaw.tags === 'object' ? ccRaw.tags : {};
            const tags = {};

            Object.entries(rawTags || {}).forEach(([tagName, def]) => {
                if (!def || typeof def !== 'object' || !Array.isArray(def.cost)) return;
                tags[tagName] = {
                    ...def,
                    cost: [...def.cost],
                };
            });

            const categories = Array.isArray(ccRaw?.Categories) && ccRaw.Categories.length > 0
                ? [...ccRaw.Categories]
                : [...new Set(Object.keys(tags).map(getTagCategory))];

            return {
                name: ccName,
                categories,
                tags,
                max: Number.isFinite(ccRaw?.max) ? Math.max(0, Math.floor(ccRaw.max)) : null
            };
        });
    };

    const getCcMaxRisk = (cc) => {
        if (Number.isFinite(cc?.max)) return Math.max(0, Math.floor(cc.max));
        return Object.values(cc?.tags || {}).reduce((sum, def) => {
            const maxCost = Math.max(...(def.cost || [0]));
            return sum + (Number.isFinite(maxCost) ? maxCost : 0);
        }, 0);
    };

    const buildDefaultCcRiskSettings = (ccEntries) => {
        const result = {};
        (ccEntries || []).forEach((cc) => {
            result[cc.name] = {min: 0, max: getCcMaxRisk(cc)};
        });
        return result;
    };

    const buildDefaultCcTagSelection = (tags) => {
        const result = {};
        Object.entries(tags || {}).forEach(([tagName, def]) => {
            const costs = {};
            (def.cost || []).forEach((cost) => {
                costs[cost] = true;
            });
            result[tagName] = {enabled: true, costs};
        });
        return result;
    };

    const buildEnabledCcTags = (tags, selection) => {
        const result = {};
        Object.entries(tags || {}).forEach(([tagName, def]) => {
            const tagSelection = selection?.[tagName];
            if (tagSelection && tagSelection.enabled === false) return;

            const allowedCosts = (def.cost || []).filter((cost) => {
                if (!tagSelection || !tagSelection.costs) return true;
                return tagSelection.costs[cost] !== false;
            });

            if (allowedCosts.length === 0) return;
            result[tagName] = {
                ...def,
                cost: allowedCosts
            };
        });
        return result;
    };

    const assignWeaponsToCharacters = (characters, weapons, weaponCountMap) => {
        const usedCounts = {...weaponCountMap};
        const byType = {};
        weapons.forEach((weapon) => {
            if (!byType[weapon.type]) byType[weapon.type] = [];
            byType[weapon.type].push(weapon);
        });

        const optionsByCharacter = {};
        characters.forEach((character) => {
            optionsByCharacter[character.name] = (byType[character.type] || []).filter(
                (weapon) => (usedCounts[weapon.name] || 0) > 0
            );
        });

        const order = [...characters].sort(
            (a, b) => optionsByCharacter[a.name].length - optionsByCharacter[b.name].length
        );

        const assignment = {};
        const walk = (idx) => {
            if (idx >= order.length) return true;
            const character = order[idx];
            const options = shuffle(optionsByCharacter[character.name]).filter(
                (weapon) => (usedCounts[weapon.name] || 0) > 0
            );

            for (const weapon of options) {
                usedCounts[weapon.name] -= 1;
                assignment[character.name] = weapon;
                if (walk(idx + 1)) return true;
                usedCounts[weapon.name] += 1;
                delete assignment[character.name];
            }
            return false;
        };

        return walk(0) ? assignment : null;
    };

    const toggleInSet = (set, key) => {
        const next = new Set(set);
        if (next.has(key)) next.delete(key);
        else next.add(key);
        return next;
    };

    function compileTags(tags) {
        const names = Object.keys(tags);

        const idOf = Object.create(null);

        names.forEach((name, i) => {
            idOf[name] = i;
        });

        const compiled = names.map((name, id) => {
            const def = tags[name];

            let disableMask = 0;
            let requireMask = 0;

            for (const disabled of def.disables || []) {
                disableMask |= (1 << idOf[disabled]);
            }

            for (const req of def.require || []) {
                requireMask |= (1 << idOf[req]);
            }

            return {
                id,
                name,
                costs: [...def.cost],
                disableMask,
                requireMask,
                maxCost: Math.max(...def.cost),
            };
        });

        compiled.sort((a, b) => b.maxCost - a.maxCost);

        const maxRemaining = new Array(compiled.length + 1).fill(0);

        for (let i = compiled.length - 1; i >= 0; i--) {
            maxRemaining[i] =
                maxRemaining[i + 1] +
                compiled[i].maxCost;
        }

        return {
            tags: compiled,
            maxRemaining
        };
    }

    function findRandomCombination(compiled, targetRisk) {
        const tags = compiled.tags;
        const maxRemaining = compiled.maxRemaining;

        const selected = [];

        let solution = null;

        const memo = new Set();

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = (Math.random() * (i + 1)) | 0;
                [arr[i], arr[j]] =
                    [arr[j], arr[i]];
            }
        }

        const tagOrder = [...tags];
        shuffle(tagOrder);

        for (const tag of tagOrder) {
            shuffle(tag.costs);
        }

        function dfs(
            index,
            risk,
            selectedMask,
            invalidRequirements
        ) {
            if (solution) {
                return true;
            }

            if (
                risk > targetRisk ||
                index >= tagOrder.length
            ) {
                return false;
            }

            if (
                risk + maxRemaining[index] <
                targetRisk
            ) {
                return false;
            }

            const memoKey =
                index +
                "|" +
                risk +
                "|" +
                selectedMask +
                "|" +
                invalidRequirements;

            if (memo.has(memoKey)) {
                return false;
            }

            if (
                risk === targetRisk &&
                invalidRequirements === 0
            ) {
                solution = [...selected];
                return true;
            }

            const tag = tagOrder[index];

            const include = () => {
                if (
                    selectedMask &
                    tag.disableMask
                ) {
                    return false;
                }

                const newMask =
                    selectedMask |
                    (1 << tag.id);

                let invalidDelta = 0;

                // requirement of this tag
                if (
                    tag.requireMask &&
                    !(newMask & tag.requireMask)
                ) {
                    invalidDelta++;
                }

                // previously invalid selected tags
                // that become valid because of this addition
                for (const item of selected) {
                    if (
                        item.requireMask &&
                        !(selectedMask & item.requireMask) &&
                        (newMask & item.requireMask)
                    ) {
                        invalidDelta--;
                    }
                }

                for (const cost of tag.costs) {
                    selected.push({
                        tag: tag.name,
                        cost,
                        requireMask: tag.requireMask
                    });

                    if (
                        dfs(
                            index + 1,
                            risk + cost,
                            newMask,
                            invalidRequirements + invalidDelta
                        )
                    ) {
                        return true;
                    }

                    selected.pop();
                }

                return false;
            };

            const skip = () =>
                dfs(
                    index + 1,
                    risk,
                    selectedMask,
                    invalidRequirements
                );

            const found =
                Math.random() < 0.5
                    ? include() || skip()
                    : skip() || include();

            if (!found) {
                memo.add(memoKey);
            }

            return found;
        }

        dfs(0, 0, 0, 0);

        return solution;
    }

    function getMaxAllowedRisk(compiled) {
        const tags = compiled.tags;

        let best = 0;

        function dfs(index, risk, selectedMask) {
            if (index === tags.length) {
                if (risk > best) {
                    best = risk;
                }
                return;
            }

            const tag = tags[index];

            // Skip
            dfs(index + 1, risk, selectedMask);

            // Include
            if (!(selectedMask & tag.disableMask)) {
                const newMask =
                    selectedMask |
                    (1 << tag.id);

                for (const cost of tag.costs) {
                    dfs(
                        index + 1,
                        risk + cost,
                        newMask
                    );
                }
            }
        }

        dfs(0, 0, 0);

        return best;
    }

    const sortCcRollByBaseOrder = (cc, ccRoll) => {
        if (!cc || !Array.isArray(ccRoll)) return [];

        const tagOrder = Object.keys(cc.tags || {});
        const tagIndexMap = new Map(tagOrder.map((tagName, idx) => [tagName, idx]));

        return [...ccRoll].sort((a, b) => {
            const aTagIndex = tagIndexMap.has(a.tag) ? tagIndexMap.get(a.tag) : Number.MAX_SAFE_INTEGER;
            const bTagIndex = tagIndexMap.has(b.tag) ? tagIndexMap.get(b.tag) : Number.MAX_SAFE_INTEGER;
            if (aTagIndex !== bTagIndex) return aTagIndex - bTagIndex;

            const costs = cc.tags?.[a.tag]?.cost || [];
            const aCostIndex = costs.indexOf(a.cost);
            const bCostIndex = costs.indexOf(b.cost);
            const safeACostIndex = aCostIndex >= 0 ? aCostIndex : Number.MAX_SAFE_INTEGER;
            const safeBCostIndex = bCostIndex >= 0 ? bCostIndex : Number.MAX_SAFE_INTEGER;
            if (safeACostIndex !== safeBCostIndex) return safeACostIndex - safeBCostIndex;

            return (a.tag || '').localeCompare(b.tag || '') || (a.cost - b.cost);
        });
    };

    const AccordionSection = ({title, titleExtra = null, defaultOpen = true, children}) => {
        const [open, setOpen] = useState(defaultOpen);
        return (
            <div className="panel-card">
                <button type="button" className="panel-header" onClick={() => setOpen((prev) => !prev)}>
                    <div className="panel-header-title-wrap">
                        <span>{title}</span>
                        {titleExtra}
                    </div>
                    <span className="panel-caret">{open ? '-' : '+'}</span>
                </button>
                {open && <div className="panel-body">{children}</div>}
            </div>
        );
    };

    const ChipFilterGroup = ({title, options, selectedSet, onToggle, onSelectAll, onClear}) => {
        const [open, setOpen] = useState(false);
        return (
            <div className="filter-group-card">
                <button type="button" className="filter-group-header" onClick={() => setOpen((prev) => !prev)}>
                    <span className="chip-group-title m-0">{title}</span>
                    <span className="panel-caret">{open ? '-' : '+'}</span>
                </button>
                {open && (
                    <div className="filter-group-body">
                        <div className="chip-tools">
                            <button type="button" className="mini-btn" aria-label={`${title} select all`}
                                    onClick={onSelectAll}>All
                            </button>
                            <button type="button" className="mini-btn" aria-label={`${title} clear all`}
                                    onClick={onClear}>None
                            </button>
                        </div>
                        <div className="chips-row">
                            {options.map((item) => (
                                <button
                                    type="button"
                                    key={`${title}-${item}`}
                                    className={`filter-chip ${selectedSet.has(item) ? 'filter-chip-active' : ''}`}
                                    aria-label={`${title} filter ${item}`}
                                    onClick={() => onToggle(item)}
                                >
                                    {item}
                                </button>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );
    };

    const sortByRarityThenName = (a, b) => {
        const rarityA = typeof a.rarity === 'number' ? a.rarity : -1;
        const rarityB = typeof b.rarity === 'number' ? b.rarity : -1;
        if (rarityA !== rarityB) return rarityB - rarityA;
        return a.name.localeCompare(b.name);
    };

    const SquareTile = ({
                            selected,
                            onClick,
                            image,
                            placeholderImage,
                            className = '',
                            title,
                            subtitle,
                            tooltip,
                            badge,
                            rarity,
                            useImageRarityBg = false,
                            showText = false,
                            children
                        }) => (
        <button
            type="button"
            className={`square-tile ${selected ? 'square-tile-selected' : ''} ${className}`.trim()}
            onClick={onClick}
            title={tooltip || title}
            aria-label={tooltip || title}
        >
            <div className={`tile-accent accent-${rarity}`}></div>
            <div
                className={`square-image-wrap ${useImageRarityBg && typeof rarity === 'number' ? `img-bg-${rarity}` : ''}`}>
                {badge && <div className="tile-badge">{badge}</div>}
                <img
                    src={image}
                    className="square-image"
                    alt={title}
                    onError={(e) => {
                        e.target.onerror = null;
                        e.target.src = placeholderImage;
                    }}
                />
            </div>
            {showText && <div className="square-title">{title}</div>}
            {showText && subtitle && <div className="square-subtitle">{subtitle}</div>}
            {children}
        </button>
    );

    const CcTagRow = ({tagName, def, state, onToggleTag, onToggleCost}) => {
        const enabled = state?.enabled !== false;
        return (
            <div className={`cc-tag-row ${enabled ? '' : 'cc-tag-row-disabled'} ${def.isLocked ?? false ? 'cc-tag-row-require' : ''} ${def.isKey ?? false ? 'cc-tag-row-split' : ''}`}>
                <button type="button" className="cc-tag-main" onClick={onToggleTag}>
                    <img
                        src={`images/tag_${normalizeName(tagName)}.png`}
                        className="cc-tag-image"
                        alt={tagName}
                        onError={(e) => {
                            e.target.onerror = null;
                            e.target.src = 'images/placeholder_cc.svg';
                        }}
                    />
                    <div className="stage-tag-text">
                        <div className="cc-tag-name">{tagName}</div>
                        <div className="stage-tag-subtitle">
                            {def.description || ''}
                        </div>
                    </div>
                </button>
                <div className="cc-tag-right">
                    <div className="cc-cost-row">
                        {(def.cost || []).map((cost) => {
                            const costEnabled = state?.costs?.[cost] !== false;
                            return (
                                <button
                                    type="button"
                                    key={`${tagName}-cost-${cost}`}
                                    className={`cc-cost-btn ${costEnabled ? 'cc-cost-btn-active' : ''}`}
                                    onClick={() => onToggleCost(cost)}
                                >
                                    Lv {cost}
                                </button>
                            );
                        })}
                    </div>
                </div>
            </div>
        );
    };

    const StageTagRow = ({row, isLevelSelected, onToggleLevel, onToggleRow}) => {
        const rowEnabled = (row.levels || []).some((level) => isLevelSelected(level.id));

        return (
        <div className={`cc-tag-row ${rowEnabled ? '' : 'cc-tag-row-disabled'}`}>
            <button type="button" className="stage-tag-main" onClick={onToggleRow}>
                <img
                    src={`images/stage_${normalizeName(`${row.zone}_${row.category}`)}.png`}
                    className="cc-tag-image"
                    alt={row.name}
                    onError={(e) => {
                        e.target.onerror = null;
                        e.target.src = 'images/placeholder_stage.svg';
                    }}
                />
                <div className="stage-tag-text">
                    <div className="cc-tag-name">{row.name}</div>
                    <div className="stage-tag-subtitle">
                        {row.name === row.category ? row.zone : `${row.zone} - ${row.category}`}
                    </div>
                </div>
            </button>
            <div className="cc-tag-right">
                <div className="cc-cost-row">
                    {(row.levels || []).map((level) => (
                        <button
                            type="button"
                            key={`${row.baseId}-lv-${level.lv}`}
                            className={`cc-cost-btn ${isLevelSelected(level.id) ? 'cc-cost-btn-active' : ''}`}
                            onClick={() => onToggleLevel(level.id)}
                        >
                            Lv {level.lv}
                        </button>
                    ))}
                </div>
            </div>
        </div>
        );
    };

    function RandomizerOutputModal({
                                       output,
                                       onClose,
                                       onRandomize,
                                       onRandomizeTeamWeapons,
                                       onRandomizeStage,
                                       onToggleCharacter,
                                       onToggleWeapon,
                                       onToggleStage,
                                       onToggleCcRollTag,
                                       isCcRollTagEnabled
                                   }) {
        if (!output) return null;

        return (
            <div className="custom-modal-overlay" onClick={onClose}>
                <div className="custom-modal" style={{maxWidth: '900px'}} onClick={e => e.stopPropagation()}>
                    <div className="modal-topbar">
                        <h4 className="m-0">Randomizer Output</h4>
                        <div className="modal-actions-wrap">
                            <button className="modal-btn btn-confirm" onClick={onRandomize}>RANDOMIZE</button>
                            <button className="modal-btn btn-cancel" onClick={onRandomizeTeamWeapons}>RANDOMIZE CHARACTERS & WEAPONS</button>
                            <button className="modal-btn btn-cancel" onClick={onRandomizeStage}>RANDOMIZE STAGE</button>
                            <button type="button" className="modal-close-x" aria-label="Close" onClick={onClose}>X</button>
                        </div>
                    </div>
                    <div className="muted-note mb-3">Click on an item to de-select it for the next randomization.</div>
                    <div className="output-grid">
                        {output.error && <div className="error-text">{output.error}</div>}

                        <div className="output-group">
                            <div className="output-label">Characters</div>
                            <div className="tile-grid output-tile-grid">
                                {output.team.map((character, idx) => (
                                    <SquareTile
                                        key={`out-char-${character.name}-${idx}`}
                                        selected={output.selectedCharacters.has(character.name)}
                                        onClick={() => onToggleCharacter(character.name)}
                                        image={`images/character_${normalizeName(character.name)}.png`}
                                        placeholderImage="images/placeholder_character.svg"
                                        title={character.name}
                                        tooltip={character.name}
                                        rarity={character.rarity}
                                        useImageRarityBg={true}
                                    />
                                ))}
                            </div>
                        </div>

                        <div className="output-group">
                            <div className="output-label">Weapons</div>
                            <div className="tile-grid output-tile-grid">
                                {output.weapons.map((entry, idx) => (
                                    <SquareTile
                                        key={`out-weapon-${entry.weapon.name}-${idx}`}
                                        selected={output.selectedWeapons.has(entry.weapon.name)}
                                        onClick={() => onToggleWeapon(entry.weapon.name)}
                                        image={`images/weapon_${normalizeName(entry.weapon.name)}.png`}
                                        placeholderImage={`images/weaponcategory_${normalizeName(entry.weapon.type)}.png`}
                                        title={entry.weapon.name}
                                        tooltip={entry.weapon.name}
                                        rarity={entry.weapon.rarity}
                                        useImageRarityBg={true}
                                    />
                                ))}
                            </div>
                        </div>

                        <div className="output-group">
                            <div className="output-label">{output.mode === 'stage' ? 'Stage' : 'CC'}</div>
                            {output.mode === 'stage' && output.stageOrCc && (
                                <div className="cc-tag-list">
                                    <StageTagRow
                                        row={{
                                            baseId: output.stageOrCc.baseId || output.stageOrCc.id,
                                            zone: output.stageOrCc.zone,
                                            category: output.stageOrCc.category,
                                            name: output.stageOrCc.name,
                                            levels: [{id: output.stageOrCc.id, lv: output.stageOrCc.lv}]
                                        }}
                                        isLevelSelected={(id) => output.selectedStages.has(id)}
                                        onToggleLevel={(id) => onToggleStage(id)}
                                        onToggleRow={() => onToggleStage(output.stageOrCc.id)}
                                    />
                                </div>
                            )}
                            {output.mode === 'cc' && output.stageOrCc && (
                                <div className="cc-placeholder-wrap">
                                    <span className="chip chip-stage">{output.stageOrCc.name}</span>
                                    <span className="chip">Risk {output.ccTargetRisk ?? 0}</span>
                                    <div className="tile-grid output-tile-grid">
                                        {sortCcRollByBaseOrder(output.stageOrCc, output.ccRoll || []).map((entry, idx) => {
                                            const tagDef = output.stageOrCc.tags?.[entry.tag];
                                            const tileClassName = `${(tagDef?.require || []).length > 0 ? 'square-tile-cc-require' : ''} ${tagDef?.isSplit ? 'square-tile-cc-split' : ''}`.trim();
                                            return (
                                                <SquareTile
                                                    key={`cc-roll-${entry.tag}-${entry.cost}-${idx}`}
                                                    selected={isCcRollTagEnabled(output.stageOrCc.name, entry.tag, entry.cost)}
                                                    onClick={() => onToggleCcRollTag(output.stageOrCc.name, entry.tag, entry.cost)}
                                                    image={`images/tag_${normalizeName(entry.tag)}.png`}
                                                    placeholderImage="images/placeholder_cc.svg"
                                                    title={entry.tag}
                                                    tooltip={entry.tag}
                                                    className={tileClassName}
                                                >
                                                    <div className="cc-roll-lv">Lv {entry.cost}</div>
                                                </SquareTile>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    function App() {
        const [data, setData] = useState(null);
        const [error, setError] = useState('');
        const [stageOrCcMode, setStageOrCcMode] = useState('stage');

        const [showImportExportModal, setShowImportExportModal] = useState(false);
        const [importExportMode, setImportExportMode] = useState('export');
        const [importExportText, setImportExportText] = useState('');
        const [importExportError, setImportExportError] = useState('');

        const [selectedCharacters, setSelectedCharacters] = useState(new Set());
        const [selectedWeapons, setSelectedWeapons] = useState(new Set());
        const [selectedStages, setSelectedStages] = useState(new Set());
        const [selectedCcName, setSelectedCcName] = useState('');
        const [ccTagSelection, setCcTagSelection] = useState({});
        const [ccRiskSettings, setCcRiskSettings] = useState({});

        const [weaponCounts, setWeaponCounts] = useState({});

        const [characterSearch, setCharacterSearch] = useState('');
        const [weaponSearch, setWeaponSearch] = useState('');
        const [stageSearch, setStageSearch] = useState('');
        const [ccSearch, setCcSearch] = useState('');
        const [ccTagSearch, setCcTagSearch] = useState('');

        const [characterClassFilters, setCharacterClassFilters] = useState(new Set());
        const [characterElementFilters, setCharacterElementFilters] = useState(new Set());
        const [characterFactionFilters, setCharacterFactionFilters] = useState(new Set());
        const [characterWeaponTypeFilters, setCharacterWeaponTypeFilters] = useState(new Set());
        const [characterRarityFilters, setCharacterRarityFilters] = useState(new Set());
        const [weaponCategoryFilters, setWeaponCategoryFilters] = useState(new Set());
        const [weaponRarityFilters, setWeaponRarityFilters] = useState(new Set());
        const [ccCategoryFilters, setCcCategoryFilters] = useState(new Set());

        const [output, setOutput] = useState(null);
        const [showOutputModal, setShowOutputModal] = useState(false);

        const SETTINGS_KEY = 'endfield_randomizer_settings_v1';

        useEffect(() => {
            const savedSettings = localStorage.getItem(SETTINGS_KEY);
            if (savedSettings) {
                try {
                    const parsed = JSON.parse(savedSettings);
                    if (parsed) {
                        if (parsed.selectedCharacters) setSelectedCharacters(new Set(parsed.selectedCharacters));
                        if (parsed.selectedWeapons) setSelectedWeapons(new Set(parsed.selectedWeapons));
                        if (parsed.weaponCounts) setWeaponCounts(parsed.weaponCounts);
                        if (parsed.selectedStages) setSelectedStages(new Set(parsed.selectedStages));
                        if (typeof parsed.selectedCcName === 'string') setSelectedCcName(parsed.selectedCcName);
                        if (!parsed.selectedCcName && Array.isArray(parsed.selectedCcs) && parsed.selectedCcs.length > 0) {
                            setSelectedCcName(parsed.selectedCcs[0]);
                        }
                        if (parsed.ccTagSelection && typeof parsed.ccTagSelection === 'object') {
                            setCcTagSelection(parsed.ccTagSelection);
                        }
                        if (parsed.ccRiskSettings && typeof parsed.ccRiskSettings === 'object') {
                            setCcRiskSettings(parsed.ccRiskSettings);
                        }
                    }
                } catch (e) {
                    console.error("Failed to parse randomizer settings from localStorage", e);
                }
            }
        }, []);

        useEffect(() => {
            if (!data) return; // Don't save until data is loaded
            const settings = {
                selectedCharacters: [...selectedCharacters],
                selectedWeapons: [...selectedWeapons],
                weaponCounts,
                selectedStages: [...selectedStages],
                selectedCcName,
                selectedCcs: selectedCcName ? [selectedCcName] : [],
                ccTagSelection,
                ccRiskSettings,
            };
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
        }, [selectedCharacters, selectedWeapons, weaponCounts, selectedStages, selectedCcName, ccTagSelection, ccRiskSettings, data]);

        useEffect(() => {
            fetch('data.json')
                .then((res) => {
                    if (!res.ok) throw new Error('Cannot load data.json');
                    return res.json();
                })
                .then((json) => {
                    const stagesFlat = flattenStages(json.stages);
                    const ccEntries = normalizeCcEntries(json.cc);

                    const characterRarities = [...new Set(json.characters.map(c => c.rarity))].sort((a, b) => a - b);
                    const weaponRarities = [...new Set(json.weapons.map(w => w.rarity))].sort((a, b) => a - b);

                    const withStageFlat = {...json, stagesFlat, weaponRarities, characterRarities, ccEntries};
                    setData(withStageFlat);

                    const savedSettings = localStorage.getItem(SETTINGS_KEY);
                    if (savedSettings) {
                        // Settings are loaded in another useEffect
                    } else {
                        // Only set defaults if no saved settings
                        setSelectedCharacters(new Set(json.characters.map((c) => c.name)));
                        setSelectedWeapons(new Set(json.weapons.map((w) => w.name)));
                        setSelectedStages(new Set(stagesFlat.map((s) => s.id)));
                        setSelectedCcName(ccEntries[0]?.name || '');

                        const initialCcTagSelection = {};
                        ccEntries.forEach((cc) => {
                            initialCcTagSelection[cc.name] = buildDefaultCcTagSelection(cc.tags);
                        });
                        setCcTagSelection(initialCcTagSelection);
                        setCcRiskSettings(buildDefaultCcRiskSettings(ccEntries));

                        const initialWeaponCounts = {};
                        json.weapons.forEach((weapon) => {
                            initialWeaponCounts[weapon.name] = 1;
                        });
                        setWeaponCounts(prev => ({...initialWeaponCounts, ...prev}));
                    }

                    setCharacterClassFilters(new Set([]));
                    setCharacterElementFilters(new Set([]));
                    setCharacterFactionFilters(new Set([]));
                    setCharacterWeaponTypeFilters(new Set([]));
                    setCharacterRarityFilters(new Set([]));
                    setWeaponCategoryFilters(new Set([]));
                    setWeaponRarityFilters(new Set([]));
                    setCcCategoryFilters(new Set([]));

                    const initialWeaponCounts = {};
                    json.weapons.forEach((weapon) => {
                        initialWeaponCounts[weapon.name] = 1;
                    });
                    setWeaponCounts(prev => ({...initialWeaponCounts, ...prev}));
                })
                .catch((err) => setError(err.message || 'Failed to load data'));
        }, []);

        // Back button handling
        useEffect(() => {
            const handlePopState = (e) => {
                if (showImportExportModal) {
                    setShowImportExportModal(false);
                    setImportExportError('');
                }
            };
            window.addEventListener('popstate', handlePopState);
            return () => window.removeEventListener('popstate', handlePopState);
        }, [showImportExportModal]);

        useEffect(() => {
            if (showImportExportModal) {
                if (!window.history.state?.modal) {
                    window.history.pushState({modal: true}, '');
                }
            }
        }, [showImportExportModal]);

        const closeModals = () => {
            if (showImportExportModal) {
                setShowImportExportModal(false);
                setImportExportError('');
                if (window.history.state?.modal) {
                    window.history.back();
                }
            }
            if (showOutputModal) {
                setShowOutputModal(false);
            }
        };

        const openImportExportModal = (mode) => {
            setImportExportMode(mode);
            setImportExportError('');
            if (mode === 'export') {
                const settings = {
                    selectedCharacters: [...selectedCharacters],
                    selectedWeapons: [...selectedWeapons],
                    weaponCounts,
                    selectedStages: [...selectedStages],
                    selectedCcName,
                    selectedCcs: selectedCcName ? [selectedCcName] : [],
                    ccTagSelection,
                    ccRiskSettings,
                };
                setImportExportText(JSON.stringify(settings, null, 2));
            } else {
                setImportExportText('');
            }
            setShowImportExportModal(true);
        };

        const handleExportSettings = () => {
            setImportExportMode('export');
            setImportExportError('');
            const settings = {
                selectedCharacters: [...selectedCharacters],
                selectedWeapons: [...selectedWeapons],
                weaponCounts,
                selectedStages: [...selectedStages],
                selectedCcName,
                selectedCcs: selectedCcName ? [selectedCcName] : [],
                ccTagSelection,
                ccRiskSettings,
            };
            setImportExportText(JSON.stringify(settings, null, 2));
        };

        const handleImportSettings = () => {
            if (!data) return;

            let parsed;
            try {
                parsed = JSON.parse(importExportText);
            } catch (err) {
                setImportExportError('Invalid JSON. Please paste a valid JSON object.');
                return;
            }

            if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
                setImportExportError('JSON must be an object.');
                return;
            }

            // Basic validation for expected keys
            const expectedKeys = ['selectedCharacters', 'selectedWeapons', 'weaponCounts', 'selectedStages', 'selectedCcs', 'selectedCcName', 'ccTagSelection', 'ccRiskSettings'];
            const hasSomeExpectedKey = expectedKeys.some(key => key in parsed);
            if (!hasSomeExpectedKey) {
                setImportExportError('Imported JSON does not contain any valid settings keys.');
                return;
            }

            if (parsed.selectedCharacters) setSelectedCharacters(new Set(parsed.selectedCharacters));
            if (parsed.selectedWeapons) setSelectedWeapons(new Set(parsed.selectedWeapons));
            if (parsed.weaponCounts) setWeaponCounts(parsed.weaponCounts);
            if (parsed.selectedStages) setSelectedStages(new Set(parsed.selectedStages));
            if (typeof parsed.selectedCcName === 'string') setSelectedCcName(parsed.selectedCcName);
            if (!parsed.selectedCcName && Array.isArray(parsed.selectedCcs) && parsed.selectedCcs.length > 0) {
                setSelectedCcName(parsed.selectedCcs[0]);
            }
            if (parsed.ccTagSelection && typeof parsed.ccTagSelection === 'object') {
                setCcTagSelection(parsed.ccTagSelection);
            }
            if (parsed.ccRiskSettings && typeof parsed.ccRiskSettings === 'object') {
                setCcRiskSettings(parsed.ccRiskSettings);
            }

            closeModals();
        };

        useEffect(() => {
            if (!data) return;
            if (stageOrCcMode === 'stage') {
                setSelectedStages((prev) => (prev.size > 0 ? prev : new Set(data.stagesFlat.map((stage) => stage.id))));
            } else {
                const availableCcNames = (data.ccEntries || []).map((cc) => cc.name);
                if (!selectedCcName || !availableCcNames.includes(selectedCcName)) {
                    setSelectedCcName(availableCcNames[0] || '');
                }
            }
        }, [stageOrCcMode, data, selectedCcName]);

        useEffect(() => {
            if (!data) return;
            setCcTagSelection((prev) => {
                const next = {...prev};
                let changed = false;
                (data.ccEntries || []).forEach((cc) => {
                    if (!next[cc.name]) {
                        next[cc.name] = buildDefaultCcTagSelection(cc.tags);
                        changed = true;
                        return;
                    }

                    const ccState = {...next[cc.name]};
                    Object.entries(cc.tags || {}).forEach(([tagName, def]) => {
                        if (!ccState[tagName]) {
                            const costs = {};
                            (def.cost || []).forEach((cost) => {
                                costs[cost] = true;
                            });
                            ccState[tagName] = {enabled: true, costs};
                            changed = true;
                            return;
                        }

                        const tagState = ccState[tagName];
                        const currentCosts = {...(tagState.costs || {})};
                        let tagChanged = false;
                        (def.cost || []).forEach((cost) => {
                            if (!(cost in currentCosts)) {
                                currentCosts[cost] = true;
                                tagChanged = true;
                            }
                        });
                        if (tagChanged) {
                            ccState[tagName] = {...tagState, costs: currentCosts};
                            changed = true;
                        }
                    });
                    next[cc.name] = ccState;
                });
                return changed ? next : prev;
            });
        }, [data]);

        useEffect(() => {
            if (!data) return;
            setCcRiskSettings((prev) => {
                const next = {...prev};
                let changed = false;
                (data.ccEntries || []).forEach((cc) => {
                    const ccMax = getCcMaxRisk(cc);
                    const existing = next[cc.name];
                    if (!existing) {
                        next[cc.name] = {min: 0, max: ccMax};
                        changed = true;
                        return;
                    }

                    const min = Number.isFinite(existing.min) ? Math.max(0, Math.floor(existing.min)) : 0;
                    const max = Number.isFinite(existing.max) ? Math.max(0, Math.floor(existing.max)) : ccMax;
                    const clampedMin = Math.min(min, ccMax);
                    const clampedMax = Math.max(clampedMin, Math.min(max, ccMax));
                    if (clampedMin !== existing.min || clampedMax !== existing.max) {
                        next[cc.name] = {min: clampedMin, max: clampedMax};
                        changed = true;
                    }
                });
                return changed ? next : prev;
            });
        }, [data]);

        useEffect(() => {
            setCcCategoryFilters(new Set());
        }, [selectedCcName]);

        const filteredCharacters = useMemo(() => {
            if (!data) return [];
            return data.characters.filter((character) => {
                const byName = character.name.toLowerCase().includes(characterSearch.toLowerCase());
                const byClass = characterClassFilters.size === 0 || characterClassFilters.has(character.class);
                const byElement = characterElementFilters.size === 0 || characterElementFilters.has(character.element);
                const byFaction = characterFactionFilters.size === 0 || characterFactionFilters.has(character.faction);
                const byWeaponType = characterWeaponTypeFilters.size === 0 || characterWeaponTypeFilters.has(character.type);
                const byRarity = characterRarityFilters.size === 0 || characterRarityFilters.has(character.rarity);
                return byName && byClass && byElement && byFaction && byWeaponType && byRarity;
            });
        }, [data, characterSearch, characterClassFilters, characterElementFilters, characterFactionFilters, characterWeaponTypeFilters, characterRarityFilters]);

        const filteredWeapons = useMemo(() => {
            if (!data) return [];
            return data.weapons.filter((weapon) => {
                const byName = weapon.name.toLowerCase().includes(weaponSearch.toLowerCase());
                const byCategory = weaponCategoryFilters.size === 0 || weaponCategoryFilters.has(weapon.type);
                const byRarity = weaponRarityFilters.size === 0 || weaponRarityFilters.has(weapon.rarity);
                return byName && byCategory && byRarity;
            }).sort(sortByRarityThenName);
        }, [data, weaponSearch, weaponCategoryFilters, weaponRarityFilters]);

        const sortedFilteredCharacters = useMemo(
            () => [...filteredCharacters].sort(sortByRarityThenName),
            [filteredCharacters]
        );

        const filteredStages = useMemo(() => {
            if (!data) return [];
            return data.stagesFlat.filter((stage) => {
                const text = `${stage.zone} ${stage.category} ${stage.name}`.toLowerCase();
                return text.includes(stageSearch.toLowerCase());
            });
        }, [data, stageSearch]);

        const groupedStages = useMemo(() => {
            const grouped = {};
            (filteredStages || []).forEach((stage) => {
                const zoneKey = stage.zone;
                if (!grouped[zoneKey]) grouped[zoneKey] = {};

                const rowKey = stage.baseId || `${stage.zone}::${stage.category}::${stage.name}`;
                if (!grouped[zoneKey][rowKey]) {
                    grouped[zoneKey][rowKey] = {
                        baseId: rowKey,
                        zone: stage.zone,
                        category: stage.category,
                        name: stage.name,
                        levels: []
                    };
                }

                grouped[zoneKey][rowKey].levels.push({id: stage.id, lv: stage.lv});
            });

            const asArrays = {};
            Object.entries(grouped).forEach(([zoneKey, rowsById]) => {
                asArrays[zoneKey] = Object.values(rowsById)
                    .map((row) => ({...row, levels: [...row.levels].sort((a, b) => a.lv - b.lv)}))
                    .sort((a, b) => a.name.localeCompare(b.name));
            });

            return asArrays;
        }, [filteredStages]);


        const filteredCcs = useMemo(() => {
            if (!data) return [];
            return (data.ccEntries || []).filter((cc) => cc.name.toLowerCase().includes(ccSearch.toLowerCase()));
        }, [data, ccSearch]);

        const selectedCc = useMemo(() => {
            return filteredCcs.find((cc) => cc.name === selectedCcName)
                || (data?.ccEntries || []).find((cc) => cc.name === selectedCcName)
                || null;
        }, [filteredCcs, data, selectedCcName]);

        const filteredCcTags = useMemo(() => {
            if (!selectedCc) return [];
            return Object.entries(selectedCc.tags).filter(([tagName]) => {
                const byText = tagName.toLowerCase().includes(ccTagSearch.toLowerCase());
                const category = getTagCategory(tagName);
                const byCategory = ccCategoryFilters.size === 0 || ccCategoryFilters.has(category);
                return byText && byCategory;
            });
        }, [selectedCc, ccTagSearch, ccCategoryFilters]);

        const selectedCcRisk = useMemo(() => {
            if (!selectedCc) return {min: 0, max: 0, maxRisk: 0};
            const maxRisk = getCcMaxRisk(selectedCc);
            const saved = ccRiskSettings[selectedCc.name] || {min: 0, max: maxRisk};
            const minRaw = Number.isFinite(saved.min) ? Math.max(0, Math.floor(saved.min)) : 0;
            const maxRaw = Number.isFinite(saved.max) ? Math.max(0, Math.floor(saved.max)) : maxRisk;
            const min = Math.min(minRaw, maxRisk);
            const max = Math.max(min, Math.min(maxRaw, maxRisk));
            return {min, max, maxRisk};
        }, [selectedCc, ccRiskSettings]);

        const runRandomizer = () => {
            if (!data) return;

            const availableCharacters = data.characters.filter((character) => selectedCharacters.has(character.name));
            if (availableCharacters.length < 4) {
                setOutput({
                    error: 'Select at least 4 characters.',
                    team: [],
                    weapons: [],
                    stageOrCc: null,
                    mode: stageOrCcMode,
                    selectedCharacters,
                    selectedWeapons,
                    selectedStages
                });
                setShowOutputModal(true);
                return;
            }

            const team = pickUnique(availableCharacters, 4);

            const availableWeapons = data.weapons.filter(
                (weapon) => selectedWeapons.has(weapon.name) && (weaponCounts[weapon.name] || 0) > 0
            );
            if (availableWeapons.length === 0) {
                setOutput({
                    error: 'Select at least one weapon with count > 0.',
                    team: [],
                    weapons: [],
                    stageOrCc: null,
                    mode: stageOrCcMode,
                    selectedCharacters,
                    selectedWeapons,
                    selectedStages
                });
                setShowOutputModal(true);
                return;
            }

            const assignment = assignWeaponsToCharacters(team, availableWeapons, weaponCounts);
            if (!assignment) {
                setOutput({
                    error: 'Cannot assign weapons to all 4 characters. Increase counts or select more compatible weapon categories.',
                    team,
                    weapons: [],
                    stageOrCc: null,
                    mode: stageOrCcMode,
                    selectedCharacters, selectedWeapons, selectedStages
                });
                setShowOutputModal(true);
                return;
            }

            if (stageOrCcMode === 'stage') {
                const availableStageList = data.stagesFlat.filter((stage) => selectedStages.has(stage.id));
                if (availableStageList.length === 0) {
                    setOutput({
                        error: 'Select at least one stage.',
                        team,
                        weapons: [],
                        stageOrCc: null,
                        mode: 'stage',
                        selectedCharacters,
                        selectedWeapons,
                        selectedStages
                    });
                    setShowOutputModal(true);
                    return;
                }
                setOutput({
                    error: '',
                    team,
                    weapons: team.map((character) => ({
                        characterName: character.name,
                        weapon: assignment[character.name]
                    })),
                    stageOrCc: getRandomItem(availableStageList),
                    mode: 'stage',
                    selectedCharacters, selectedWeapons, selectedStages
                });
                setShowOutputModal(true);
                return;
            }

            const cc = (data.ccEntries || []).find((item) => item.name === selectedCcName);
            if (!cc) {
                setOutput({
                    error: 'Select at least one CC.',
                    team,
                    weapons: [],
                    stageOrCc: null,
                    mode: 'cc',
                    selectedCharacters,
                    selectedWeapons,
                    selectedStages
                });
                setShowOutputModal(true);
                return;
            }

            const enabledTags = buildEnabledCcTags(cc.tags, ccTagSelection[cc.name]);
            if (Object.keys(enabledTags).length === 0) {
                setOutput({
                    error: 'Enable at least one CC tag with at least one Lv cost.',
                    team,
                    weapons: [],
                    stageOrCc: cc,
                    ccRoll: [],
                    mode: 'cc',
                    selectedCharacters,
                    selectedWeapons,
                    selectedStages
                });
                setShowOutputModal(true);
                return;
            }

            const ccRisk = ccRiskSettings[cc.name] || {min: 0, max: getCcMaxRisk(cc)};
            const ccMax = getCcMaxRisk(cc);
            const minRisk = Math.min(Math.max(0, Math.floor(Number(ccRisk.min) || 0)), ccMax);
            const maxRisk = Math.max(minRisk, Math.min(Math.max(0, Math.floor(Number(ccRisk.max) || ccMax)), ccMax));

            // Cap configured risk range to the real maximum achievable risk for enabled tags.
            const maxAllowedRisk = getMaxAllowedRisk(enabledTags);
            const cappedMaxRisk = Math.min(maxRisk, maxAllowedRisk);
            const cappedMinRisk = Math.min(minRisk, cappedMaxRisk);
            const targetRisk = randomIntInclusive(cappedMinRisk, cappedMaxRisk);

            const ccRoll = findRandomCombination(enabledTags, targetRisk);
            if (!ccRoll) {
                setOutput({
                    error: `Could not build Risk ${targetRisk} from currently enabled CC tag levels.`,
                    team,
                    weapons: team.map((character) => ({characterName: character.name, weapon: assignment[character.name]})),
                    stageOrCc: cc,
                    ccTargetRisk: targetRisk,
                    ccRoll: [],
                    mode: 'cc',
                    selectedCharacters,
                    selectedWeapons,
                    selectedStages
                });
                setShowOutputModal(true);
                return;
            }

            setOutput({
                error: '',
                team,
                weapons: team.map((character) => ({characterName: character.name, weapon: assignment[character.name]})),
                stageOrCc: cc,
                ccTargetRisk: targetRisk,
                ccRoll: sortCcRollByBaseOrder(cc, ccRoll),
                mode: 'cc',
                selectedCharacters, selectedWeapons, selectedStages
            });
            setShowOutputModal(true);
        };

        const runRandomizerTeamWeapons = () => {
            if (!data || !output) return;

            const availableCharacters = data.characters.filter((character) => selectedCharacters.has(character.name));
            if (availableCharacters.length < 4) {
                setOutput((prev) => ({
                    ...prev,
                    error: 'Select at least 4 characters.',
                    team: [],
                    weapons: []
                }));
                return;
            }

            const team = pickUnique(availableCharacters, 4);
            const availableWeapons = data.weapons.filter(
                (weapon) => selectedWeapons.has(weapon.name) && (weaponCounts[weapon.name] || 0) > 0
            );

            if (availableWeapons.length === 0) {
                setOutput((prev) => ({
                    ...prev,
                    error: 'Select at least one weapon with count > 0.',
                    team: [],
                    weapons: []
                }));
                return;
            }

            const assignment = assignWeaponsToCharacters(team, availableWeapons, weaponCounts);
            if (!assignment) {
                setOutput((prev) => ({
                    ...prev,
                    error: 'Cannot assign weapons to all 4 characters. Increase counts or select more compatible weapon categories.',
                    team,
                    weapons: []
                }));
                return;
            }

            setOutput((prev) => ({
                ...prev,
                error: '',
                team,
                weapons: team.map((character) => ({characterName: character.name, weapon: assignment[character.name]}))
            }));
        };

        const runRandomizerStageOnly = () => {
            if (!data || !output) return;

            if (output.mode === 'stage') {
                const availableStageList = data.stagesFlat.filter((stage) => selectedStages.has(stage.id));
                if (availableStageList.length === 0) {
                    setOutput((prev) => ({...prev, error: 'Select at least one stage.'}));
                    return;
                }

                setOutput((prev) => ({
                    ...prev,
                    error: '',
                    stageOrCc: getRandomItem(availableStageList)
                }));
                return;
            }

            const cc = (data.ccEntries || []).find((item) => item.name === selectedCcName);
            if (!cc) {
                setOutput((prev) => ({...prev, error: 'Select at least one CC.'}));
                return;
            }

            const enabledTags = buildEnabledCcTags(cc.tags, ccTagSelection[cc.name]);
            if (Object.keys(enabledTags).length === 0) {
                setOutput((prev) => ({...prev, error: 'Enable at least one CC tag with at least one Lv cost.', ccRoll: []}));
                return;
            }

            const ccRisk = ccRiskSettings[cc.name] || {min: 0, max: getCcMaxRisk(cc)};
            const ccMax = getCcMaxRisk(cc);
            const minRisk = Math.min(Math.max(0, Math.floor(Number(ccRisk.min) || 0)), ccMax);
            const maxRisk = Math.max(minRisk, Math.min(Math.max(0, Math.floor(Number(ccRisk.max) || ccMax)), ccMax));
            const maxAllowedRisk = getMaxAllowedRisk(enabledTags);
            const cappedMaxRisk = Math.min(maxRisk, maxAllowedRisk);
            const cappedMinRisk = Math.min(minRisk, cappedMaxRisk);
            const targetRisk = randomIntInclusive(cappedMinRisk, cappedMaxRisk);

            const ccRoll = findRandomCombination(enabledTags, targetRisk);
            if (!ccRoll) {
                setOutput((prev) => ({
                    ...prev,
                    error: `Could not build Risk ${targetRisk} from currently enabled CC tag levels.`,
                    stageOrCc: cc,
                    ccTargetRisk: targetRisk,
                    ccRoll: []
                }));
                return;
            }

            setOutput((prev) => ({
                ...prev,
                error: '',
                stageOrCc: cc,
                ccTargetRisk: targetRisk,
                ccRoll: sortCcRollByBaseOrder(cc, ccRoll)
            }));
        };

        if (error) return <div className="loading-overlay">{error}</div>;
        if (!data) return <div className="loading-overlay">Loading data...</div>;

        return (
            <div className="container-fluid py-4 app-shell">
                {showImportExportModal && (
                    <div className="custom-modal-overlay" onClick={closeModals}>
                        <div className="custom-modal" style={{maxWidth: '700px'}} onClick={e => e.stopPropagation()}>

                            <div className="d-flex gap-2 mb-3">
                                <button className="reset-btn" onClick={handleExportSettings}>EXPORT JSON</button>
                                <button className="reset-btn" onClick={() => {
                                    setImportExportMode('import');
                                    setImportExportError('');
                                }}>IMPORT JSON
                                </button>
                            </div>
                            <label htmlFor="importExportTextarea" style={{color: '#aaa', fontSize: '0.85rem'}}>
                                {importExportMode === 'export'
                                    ? 'Copy this JSON to export your saved settings.'
                                    : 'Paste JSON object to import your settings.'}
                            </label>
                            <textarea
                                id="importExportTextarea"
                                className="form-control form-control-sm bg-dark text-light border-secondary"
                                rows="14"
                                value={importExportText}
                                readOnly={importExportMode === 'export'}
                                onChange={e => setImportExportText(e.target.value)}
                                placeholder="Paste your settings here..."
                                style={{fontFamily: 'Consolas, Monaco, monospace'}}
                            />
                            {importExportError && (
                                <div className="mt-2"
                                     style={{color: '#ff8a8a', fontSize: '0.85rem'}}>{importExportError}</div>
                            )}
                            <div className="modal-buttons">
                                {importExportMode === 'import' && (
                                    <button className="modal-btn btn-confirm"
                                            onClick={handleImportSettings}>IMPORT</button>
                                )}
                                <button className="modal-btn btn-cancel" onClick={closeModals}>CLOSE</button>
                            </div>
                        </div>
                    </div>
                )}
                {showOutputModal && <RandomizerOutputModal
                    output={output}
                    onClose={closeModals}
                    onRandomize={runRandomizer}
                    onRandomizeTeamWeapons={runRandomizerTeamWeapons}
                    onRandomizeStage={runRandomizerStageOnly}
                    onToggleCharacter={(name) => {
                        const next = toggleInSet(selectedCharacters, name);
                        setSelectedCharacters(next);
                        setOutput(prev => ({...prev, selectedCharacters: next}));
                    }}
                    onToggleWeapon={(name) => {
                        const next = toggleInSet(selectedWeapons, name);
                        setSelectedWeapons(next);
                        setOutput(prev => ({...prev, selectedWeapons: next}));
                    }}
                    onToggleStage={(id) => {
                        const next = toggleInSet(selectedStages, id);
                        setSelectedStages(next);
                        setOutput(prev => ({...prev, selectedStages: next}));
                    }}
                    onToggleCcRollTag={(ccName, tagName, cost) => {
                        setCcTagSelection((prev) => {
                            const next = {...prev};
                            const ccState = {...(next[ccName] || {})};
                            const current = ccState[tagName] || {
                                enabled: true,
                                costs: {[cost]: true}
                            };

                            const nextCostEnabled = current.costs?.[cost] === false;
                            const nextCosts = {
                                ...(current.costs || {}),
                                [cost]: nextCostEnabled
                            };

                            const hasAnyEnabledCost = Object.values(nextCosts).some((value) => value !== false);
                            ccState[tagName] = {
                                ...current,
                                enabled: hasAnyEnabledCost,
                                costs: nextCosts
                            };
                            next[ccName] = ccState;
                            return next;
                        });
                    }}
                    isCcRollTagEnabled={(ccName, tagName, cost) => {
                        const state = ccTagSelection?.[ccName]?.[tagName];
                        if (!state) return true;
                        if (state.enabled === false) return false;
                        return state.costs?.[cost] !== false;
                    }}
                />}
                <header className="mb-3">
                    <div className="d-flex justify-content-between align-items-center mb-2">

                        <div className="d-flex gap-2">
                            <a className="mini-btn btn-yellow" href="https://moques.github.io/endfieldtools/"

                            <button type="button" className="mini-btn"
                                    onClick={() => openImportExportModal('export')}>EXPORT
                            </button>
                            <button type="button" className="mini-btn"
                                    onClick={() => openImportExportModal('import')}>IMPORT
                            </button>

                        </div>
                    </div>
                </header>

                                    onSelectAll={() => setCharacterClassFilters(new Set(data.classes || []))}
                                    onClear={() => setCharacterClassFilters(new Set())}

                                <ChipFilterGroup

                                    onClear={() => setCharacterElementFilters(new Set())}
                                />
                                <ChipFilterGroup
                                    title="Faction"
                                    options={data.fractions || []}

                                    onToggle={(value) => setCharacterFactionFilters((prev) => toggleInSet(prev, value))}
                                    onSelectAll={() => setCharacterFactionFilters(new Set(data.fractions || []))}
                                    onClear={() => setCharacterFactionFilters(new Set())}
                                />
                                <ChipFilterGroup
                                    title="Weapon Type"

                                    selectedSet={characterWeaponTypeFilters}
                                    onToggle={(value) => setCharacterWeaponTypeFilters((prev) => toggleInSet(prev, value))}
                                    onSelectAll={() => setCharacterWeaponTypeFilters(new Set(data.weaponcategory || []))}
                                    onClear={() => setCharacterWeaponTypeFilters(new Set())}
                                />
                                <ChipFilterGroup
                                    title="Rarity"

                                    onToggle={(value) => setCharacterRarityFilters((prev) => toggleInSet(prev, value))}
                                    onSelectAll={() => setCharacterRarityFilters(new Set(data.characterRarities || []))}
                                    onClear={() => setCharacterRarityFilters(new Set())}
                                />
                            </AccordionSection>

                            <div className="control-row mt-2">
                                <button
                                    type="button"
                                    className="mini-btn"
                                    onClick={() => setSelectedCharacters((prev) => {
                                        const next = new Set(prev);
                                        filteredCharacters.forEach((item) => next.add(item.name));
                                        return next;
                                    })}
                                >
                                    Select visible

                                <button
                                    type="button"
                                    className="mini-btn"
                                    onClick={() => setSelectedCharacters((prev) => {
                                        const next = new Set(prev);
                                        filteredCharacters.forEach((item) => next.delete(item.name));
                                        return next;
                                    })}
                                >
                                    Clear visible
                                </button>
                            </div>

                            <div className="tile-grid">
                                {sortedFilteredCharacters.map((character) => (
                                    <SquareTile
                                        key={character.name}
                                        selected={selectedCharacters.has(character.name)}
                                        onClick={() => setSelectedCharacters((prev) => toggleInSet(prev, character.name))}
                                        image={`images/character_${normalizeName(character.name)}.png`}
                                        placeholderImage="images/placeholder_character.svg"
                                        title={character.name}
                                        tooltip={character.name}
                                        rarity={character.rarity}
                                        useImageRarityBg={true}
                                    />
                                ))}
                            </div>
                        </AccordionSection>

                        <AccordionSection

                            titleExtra={<span className="count-text-header">Selected: {selectedWeapons.size}</span>}

                        >
                            <div className="filter-row">

                                    type="text"
                                    aria-label="Search weapons"
                                    placeholder="Search weapon..."
                                    value={weaponSearch}
                                    onChange={(e) => setWeaponSearch(e.target.value)}
                                />
                            </div>

                            <AccordionSection title="Filters" defaultOpen={false}>

                                <ChipFilterGroup
                                    title="Weapon Category"

                                    onSelectAll={() => setWeaponCategoryFilters(new Set(data.weaponcategory || []))}
                                    onClear={() => setWeaponCategoryFilters(new Set())}
                                />
                                <ChipFilterGroup
                                    title="Rarity"
                                    options={data.weaponRarities || []}
                                    selectedSet={weaponRarityFilters}
                                    onToggle={(value) => setWeaponRarityFilters((prev) => toggleInSet(prev, value))}
                                    onSelectAll={() => setWeaponRarityFilters(new Set(data.weaponRarities || []))}
                                    onClear={() => setWeaponRarityFilters(new Set())}

                                <button

                                    className="mini-btn"

                                        filteredWeapons.forEach((item) => next.delete(item.name));

                                        selected={selectedWeapons.has(weapon.name)}

                                        placeholderImage={`images/weaponcategory_${normalizeName(weapon.type)}.png`}
                                        title={weapon.name}
                                        tooltip={weapon.name}
                                        rarity={weapon.rarity}
                                        useImageRarityBg={true}

                                        <div className="count-input-wrap" onClick={(e) => e.stopPropagation()}>

                                                value={weaponCounts[weapon.name] || 0}
                                                onChange={(e) => {
                                                    const value = Number.parseInt(e.target.value, 10);
                                                    setWeaponCounts((prev) => ({
                                                        ...prev,
                                                        [weapon.name]: Number.isNaN(value) ? 0 : Math.max(0, value)
                                                    }));
                                                }}
                                            />
                                        </div>
                                    </SquareTile>
                                ))}
                            </div>
                        </AccordionSection>
                    </div>

                    <div className="col-lg-6">
                        <AccordionSection title="Stage / CC Mode" defaultOpen={true}>
                            <div className="mode-row">
                                <label className={`mode-pill ${stageOrCcMode === 'stage' ? 'mode-pill-active' : ''}`}>
                                    <input
                                        type="radio"
                                        name="stage-or-cc"

                                        onChange={() => setStageOrCcMode('stage')}

                                    <span>Stage</span>
